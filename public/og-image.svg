<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="24"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.06">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="white" opacity="0.04"/>
  <circle cx="150" cy="530" r="140" fill="white" opacity="0.03"/>
  <circle cx="950" cy="500" r="90" fill="white" opacity="0.05"/>

  <!-- Sitemap node graphic (left side) -->
  <g transform="translate(100, 180)">
    <!-- Connection lines -->
    <line x1="80" y1="80" x2="160" y2="40" stroke="white" stroke-width="2" opacity="0.4"/>
    <line x1="80" y1="80" x2="160" y2="120" stroke="white" stroke-width="2" opacity="0.4"/>
    <line x1="80" y1="80" x2="40" y2="150" stroke="white" stroke-width="2" opacity="0.4"/>
    <line x1="80" y1="80" x2="160" y2="200" stroke="white" stroke-width="2" opacity="0.4"/>

    <!-- Root node -->
    <circle cx="80" cy="80" r="28" fill="white" opacity="0.95"/>
    <circle cx="80" cy="80" r="12" fill="#6366f1"/>

    <!-- Child nodes -->
    <circle cx="160" cy="40" r="16" fill="white" opacity="0.8"/>
    <circle cx="160" cy="120" r="16" fill="white" opacity="0.8"/>
    <circle cx="40" cy="150" r="14" fill="white" opacity="0.7"/>
    <circle cx="160" cy="200" r="14" fill="white" opacity="0.7"/>

    <!-- Grandchild nodes -->
    <circle cx="230" cy="25" r="9" fill="white" opacity="0.5"/>
    <circle cx="230" cy="55" r="9" fill="white" opacity="0.5"/>
    <circle cx="235" cy="105" r="9" fill="white" opacity="0.5"/>
    <circle cx="235" cy="135" r="9" fill="white" opacity="0.5"/>
    <circle cx="10" cy="175" r="8" fill="white" opacity="0.45"/>
    <circle cx="70" cy="185" r="8" fill="white" opacity="0.45"/>
  </g>

  <!-- Card with text (right side) -->
  <rect x="380" y="165" width="740" height="300" rx="20" fill="url(#cardBg)" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>

  <!-- Title text -->
  <text x="450" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="800" fill="white">
    AI Sitemap Generator
  </text>

  <!-- Subtitle -->
  <text x="450" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="white" opacity="0.85">
    Crawl • Analyze • Export SEO-Optimized Sitemaps
  </text>

  <!-- Feature badges -->
  <g transform="translate(450, 365)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="150" height="36" rx="18" fill="white" fill-opacity="0.2"/>
    <text x="75" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Free Forever</text>

    <!-- Badge 2 -->
    <rect x="165" y="0" width="155" height="36" rx="18" fill="white" fill-opacity="0.2"/>
    <text x="242" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">No Sign-up</text>

    <!-- Badge 3 -->
    <rect x="335" y="0" width="145" height="36" rx="18" fill="white" fill-opacity="0.2"/>
    <text x="407" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">AI Powered</text>
  </g>

  <!-- URL at bottom -->
  <text x="450" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="white" opacity="0.5">
    ai-sitemap-generator.pages.dev
  </text>
</svg>
